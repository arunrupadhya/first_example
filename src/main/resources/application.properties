spring.application.name=Backend
# AWS PostgreSQL configuration
spring.datasource.url=jdbc:postgresql://arun.cehmocquskhc.us-east-1.rds.amazonaws.com:5432/postgres
spring.datasource.username=${DB_USERNAME:arunmaster}
spring.datasource.password=${DB_PASSWORD:arunmaster111$}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Allow circular references as a temporary fix
spring.main.allow-circular-references=true

# AWS S3 configuration

aws.s3.bucket-name=aruns3-078654145228-us-east-1-an
aws.s3.region=us-east-1
aws.s3.photo-prefix=candidate-photos/photos/
aws.s3.document-prefix=candidate-documents/
aws.s3.video-prefix=candidate-videos/

# File upload limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Email (SMTP) configuration — update with your SMTP details
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
