spring.application.name=Backend

# AWS Secrets Manager bootstrap
aws.secret.name=dev/my-app/allSecrets
aws.secrets.region=us-east-1

# AWS PostgreSQL configuration
spring.datasource.url=jdbc:postgresql://arun.cehmocquskhc.us-east-1.rds.amazonaws.com:5432/postgres
spring.datasource.username=${DB_USERNAME:arunmaster}
spring.datasource.password=${DB_PASSWORD:arunmaster111$}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}
spring.jpa.database-platform=${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# HikariCP connection pool tuning
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# Hibernate batching for bulk inserts
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true

# AWS S3 configuration
aws.s3.access-key=${AWS_ACCESS_KEY_ID:}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:}
aws.s3.region=${AWS_REGION:us-east-1}
aws.s3.photo-prefix=${AWS_S3_PHOTO_PREFIX:candidate-photos/photos/}
aws.s3.document-prefix=${AWS_S3_DOCUMENT_PREFIX:candidate-documents/}
aws.s3.video-prefix=${AWS_S3_VIDEO_PREFIX:candidate-videos/}

# File upload limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Email (SMTP) configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=

# OAuth2 Specific Properties
spring.mail.properties.mail.smtp.auth.mechanisms=XOAUTH2
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Custom properties to store your keys (referenced in your Java code)
google.oauth2.clientId=${GOOGLE_OAUTH2_CLIENT_ID:}
google.oauth2.clientSecret=${GOOGLE_OAUTH2_CLIENT_SECRET:}
google.oauth2.refreshToken=${GOOGLE_OAUTH2_REFRESH_TOKEN:}

# JWT configuration
app.jwt.secret=${JWT_SECRET:dev-only-jwt-secret-change-me-12345678901234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:36000000}

# AWS Bedrock AI configuration
aws.bedrock.region=${AWS_BEDROCK_REGION:${AWS_REGION:us-east-1}}
aws.bedrock.model-id=${AWS_BEDROCK_MODEL_ID:}
